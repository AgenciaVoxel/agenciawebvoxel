<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Google Font Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap');
    </style>

    <!-- Gradient definitions -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48a6ff" />
      <stop offset="100%" stop-color="#165eff" />
    </linearGradient>

    <linearGradient id="midGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#165eff" />
      <stop offset="100%" stop-color="#7c3dff" />
    </linearGradient>

    <linearGradient id="violetGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3dff" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="xGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#165eff" />
      <stop offset="100%" stop-color="#7c3dff" />
    </linearGradient>

    <linearGradient id="xGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3dff" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="lineGradLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="100%" stop-color="#165eff" />
    </linearGradient>
    
    <linearGradient id="lineGradRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>

    <!-- Soft drop shadow for 3D appearance -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Isotype (Code symbol </>) -->
  <g filter="url(#shadow)">
    <!-- Left Bracket -->
    <path d="M 190 100 L 110 180 L 190 260" stroke="url(#blueGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Slash -->
    <path d="M 220 280 L 280 80" stroke="url(#midGrad)" stroke-width="28" stroke-linecap="round" fill="none" />
    <!-- Right Bracket -->
    <path d="M 310 100 L 390 180 L 310 260" stroke="url(#violetGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Typography "voxel" -->
  <g>
    <!-- Left side: vo -->
    <text font-family="'Outfit', sans-serif" font-weight="300" font-size="82" fill="#ffffff" text-anchor="end" x="212" y="376">vo</text>

    <!-- Custom Graphic "x" with intersecting gradients -->
    <g filter="url(#shadow)">
      <!-- Diagonal bar top-left to bottom-right -->
      <path d="M 226 322 L 274 368" stroke="url(#xGrad2)" stroke-width="16" stroke-linecap="round" />
      <!-- Diagonal bar bottom-left to top-right -->
      <path d="M 226 368 L 274 322" stroke="url(#xGrad1)" stroke-width="16" stroke-linecap="round" />
    </g>

    <!-- Right side: el -->
    <text font-family="'Outfit', sans-serif" font-weight="300" font-size="82" fill="#ffffff" text-anchor="start" x="288" y="376">el</text>
  </g>

  <!-- Tagline and lines -->
  <g>
    <!-- Left tagline line -->
    <line x1="30" y1="439" x2="80" y2="439" stroke="url(#lineGradLeft)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Tagline text -->
    <text font-family="'Outfit', sans-serif" font-weight="600" font-size="14.5" fill="#a5afc3" text-anchor="middle" x="250" y="444" letter-spacing="7">AGENCIA DE PÁGINAS WEB</text>
    
    <!-- Right tagline line -->
    <line x1="420" y1="439" x2="470" y2="439" stroke="url(#lineGradRight)" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
