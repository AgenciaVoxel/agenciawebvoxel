<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 50 340 260" width="100%" height="100%">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="blueGradMark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48a6ff" />
      <stop offset="100%" stop-color="#165eff" />
    </linearGradient>

    <linearGradient id="midGradMark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#165eff" />
      <stop offset="100%" stop-color="#7c3dff" />
    </linearGradient>

    <linearGradient id="violetGradMark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3dff" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Soft drop shadow for 3D appearance -->
    <filter id="shadowMark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Isotype (Code symbol </>) -->
  <g filter="url(#shadowMark)">
    <!-- Left Bracket -->
    <path d="M 190 100 L 110 180 L 190 260" stroke="url(#blueGradMark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Slash -->
    <path d="M 220 280 L 280 80" stroke="url(#midGradMark)" stroke-width="28" stroke-linecap="round" fill="none" />
    <!-- Right Bracket -->
    <path d="M 310 100 L 390 180 L 310 260" stroke="url(#violetGradMark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
